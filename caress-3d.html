<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caress 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; cursor: grab; }
        body.dragging { cursor: grabbing; }

        /* Phase 1 — 유도 링 */
        #guideRing {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 62vh; height: 62vh;
            border-radius: 50%;
            border: 1.5px solid rgba(190, 110, 130, 0.22);
            filter: blur(6px);
            pointer-events: none;
            transition: opacity 0.8s ease, border-color 0.4s ease;
        }
        #guideRing.inZone {
            border-color: rgba(210, 120, 140, 0.55);
            filter: blur(10px);
        }

        /* Phase 1 — 만족도 SVG 아크 */
        #satisfactionSVG {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 72vh; height: 72vh;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Phase 2 — 온도 + 피드백 */
        #feedbackUI {
            position: fixed; bottom: 52px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px; font-weight: 300;
            color: rgba(180, 40, 40, 0.85);
            letter-spacing: 0.1em;
            text-align: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
            text-shadow: 0 0 14px rgba(235, 80, 130, 0.28);
            white-space: nowrap;
        }

        /* 힌트 */
        #hint {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 11px; font-weight: 300;
            color: rgba(160, 80, 95, 0.35);
            letter-spacing: 0.28em;
            pointer-events: none;
            transition: opacity 1s ease;
            white-space: nowrap;
        }

        /* 페이즈 전환 메시지 */
        #phaseMsg {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 18px; font-weight: 300;
            color: rgba(130, 50, 70, 0.88);
            letter-spacing: 0.15em;
            text-align: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease;
            text-shadow: 0 0 18px rgba(235, 80, 130, 0.3);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300&display=swap" rel="stylesheet">
</head>
<body>

<!-- Phase 1 UI -->
<div id="guideRing"></div>
<svg id="satisfactionSVG" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="47" fill="none"
        stroke="rgba(200,130,150,0.10)" stroke-width="0.6"/>
    <circle id="satArc" cx="50" cy="50" r="47" fill="none"
        stroke="rgba(200,120,140,0.7)" stroke-width="0.6"
        stroke-linecap="round"
        transform="rotate(-90 50 50)"/>
</svg>

<!-- Phase 2 UI -->
<div id="feedbackUI"></div>

<!-- 공통 -->
<div id="hint">스크롤 — 크기 조절</div>
<div id="phaseMsg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════
//  기본 세팅
// ═══════════════════════════════
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0xffffff);
document.body.appendChild(renderer.domElement);

// ═══════════════════════════════
//  파티클
// ═══════════════════════════════
function makeCircleTex() {
    const c = document.createElement('canvas');
    c.width = c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64,64,0, 64,64,60);
    g.addColorStop(0,    'rgba(255,255,255,1)');
    g.addColorStop(0.65, 'rgba(255,255,255,1)');
    g.addColorStop(0.85, 'rgba(255,255,255,0.4)');
    g.addColorStop(1,    'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,128,128);
    return new THREE.CanvasTexture(c);
}

const N = 680, SPHERE_R = 1.5;
const golden = Math.PI * (3 - Math.sqrt(5));

const origPos  = new Float32Array(N * 3);
const posArr   = new Float32Array(N * 3);
const colBase  = new Float32Array(N * 3);  // 원래 색
const colArr   = new Float32Array(N * 3);  // 실시간 색
const sizeArr  = new Float32Array(N);

for (let i = 0; i < N; i++) {
    const yi = 1 - (i / (N-1)) * 2;
    const ry = Math.sqrt(Math.max(0, 1 - yi*yi));
    const th = golden * i;
    const r  = SPHERE_R * (0.95 + Math.random() * 0.1);

    origPos[i*3]   = posArr[i*3]   = Math.cos(th) * ry * r;
    origPos[i*3+1] = posArr[i*3+1] = yi * r;
    origPos[i*3+2] = posArr[i*3+2] = Math.sin(th) * ry * r;

    const t = Math.random();
    let h, s, l;
    if      (t < 0.30) { h=12 +Math.random()*15; s=40+Math.random()*20; l=62+Math.random()*14; }
    else if (t < 0.58) { h=345+Math.random()*20; s=35+Math.random()*22; l=68+Math.random()*12; }
    else if (t < 0.80) { h=5  +Math.random()*15; s=50+Math.random()*20; l=70+Math.random()*10; }
    else               { h=330+Math.random()*15; s=28+Math.random()*18; l=60+Math.random()*12; }

    const col = new THREE.Color().setHSL(h/360, s/100, l/100);
    colBase[i*3] = colArr[i*3] = col.r;
    colBase[i*3+1] = colArr[i*3+1] = col.g;
    colBase[i*3+2] = colArr[i*3+2] = col.b;

    sizeArr[i] = 0.09 + Math.random() * 0.05;
}

const geo = new THREE.BufferGeometry();
const posAttr  = new THREE.BufferAttribute(posArr,  3).setUsage(THREE.DynamicDrawUsage);
const colAttr  = new THREE.BufferAttribute(colArr,  3).setUsage(THREE.DynamicDrawUsage);
geo.setAttribute('position', posAttr);
geo.setAttribute('color',    colAttr);
geo.setAttribute('size',     new THREE.BufferAttribute(sizeArr, 1));

const mat = new THREE.ShaderMaterial({
    uniforms: { tex: { value: makeCircleTex() } },
    vertexShader: `
        attribute float size;
        varying vec3 vColor;
        void main() {
            vColor = color;
            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (420.0 / -mvPos.z);
            gl_Position  = projectionMatrix * mvPos;
        }
    `,
    fragmentShader: `
        uniform sampler2D tex;
        varying vec3 vColor;
        void main() {
            float a = texture2D(tex, gl_PointCoord).a;
            if (a < 0.01) discard;
            gl_FragColor = vec4(vColor, a * 0.92);
        }
    `,
    transparent: true,
    vertexColors: true,
    depthWrite:   false,
    blending:     THREE.NormalBlending,
});

const points = new THREE.Points(geo, mat);
scene.add(points);

// ═══════════════════════════════
//  상태 머신
// ═══════════════════════════════
let phase = 1;
let transitioning = false;

// Phase 1
let satisfactionScore = 0;
const P1_ZONE_MIN = 4.8, P1_ZONE_MAX = 5.8;
const P1_INCR = 0.006, P1_DECR = 0.004;

// Phase 2
let touchScore = 0;
let mouseX = innerWidth/2,  mouseY = innerHeight/2;
let prevMX = innerWidth/2,  prevMY = innerHeight/2;
let mouseSpeed = 0;
const MIN_SPD = 1.5, MAX_SPD = 8.5;

// ═══════════════════════════════
//  카메라 오빗
// ═══════════════════════════════
let tTheta = 0.3, tPhi = Math.PI * 0.46, tRadius = 8.5;
let cTheta = tTheta, cPhi = tPhi, cRadius = tRadius;
const MIN_R = 1.5, MAX_R = 12.0;
let isDragging = false, lastX = 0, lastY = 0;

renderer.domElement.addEventListener('mousedown', e => {
    isDragging = true; lastX = e.clientX; lastY = e.clientY;
    document.body.classList.add('dragging');
});
window.addEventListener('mouseup', () => { isDragging = false; document.body.classList.remove('dragging'); });
window.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    if (!isDragging) return;
    tTheta -= (e.clientX - lastX) * 0.005;
    tPhi   -= (e.clientY - lastY) * 0.005;
    tPhi    = Math.max(0.12, Math.min(Math.PI - 0.12, tPhi));
    lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('wheel', e => {
    tRadius = Math.max(MIN_R, Math.min(MAX_R, tRadius + e.deltaY * 0.006));
}, { passive: true });

// 터치 (핀치 줌 포함)
let lastTouch = null, lastPinch = null;
renderer.domElement.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { isDragging = true; lastTouch = {x: e.touches[0].clientX, y: e.touches[0].clientY}; }
    if (e.touches.length === 2) lastPinch = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
}, { passive: true });
window.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && lastTouch) {
        mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
        if (isDragging) {
            tTheta -= (e.touches[0].clientX - lastTouch.x) * 0.005;
            tPhi   -= (e.touches[0].clientY - lastTouch.y) * 0.005;
            tPhi    = Math.max(0.12, Math.min(Math.PI-0.12, tPhi));
        }
        lastTouch = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    }
    if (e.touches.length === 2 && lastPinch !== null) {
        const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        tRadius = Math.max(MIN_R, Math.min(MAX_R, tRadius - (d - lastPinch) * 0.015));
        lastPinch = d;
    }
}, { passive: true });
window.addEventListener('touchend', () => { isDragging = false; lastPinch = null; });

// ═══════════════════════════════
//  UI 요소
// ═══════════════════════════════
const guideRing      = document.getElementById('guideRing');
const satSVG         = document.getElementById('satisfactionSVG');
const satArc         = document.getElementById('satArc');
const feedbackUI     = document.getElementById('feedbackUI');
const hintEl         = document.getElementById('hint');
const phaseMsgEl     = document.getElementById('phaseMsg');

// 아크 둘레
const ARC_R = 47;
const ARC_C = 2 * Math.PI * ARC_R;
satArc.setAttribute('stroke-dasharray', ARC_C);
satArc.setAttribute('stroke-dashoffset', ARC_C);

function updateSatArc(score) {
    const offset = ARC_C * (1 - score);
    satArc.setAttribute('stroke-dashoffset', offset);
}

// 구의 스크린-스페이스 투영 반경
function getSphereScreen() {
    const ctr = new THREE.Vector3(0, 0, 0).project(camera);
    const edge = new THREE.Vector3(SPHERE_R, 0, 0).project(camera);
    const cx = (ctr.x + 1) * innerWidth  / 2;
    const cy = (-ctr.y + 1) * innerHeight / 2;
    const ex = (edge.x + 1) * innerWidth  / 2;
    const ey = (-edge.y + 1) * innerHeight / 2;
    return { cx, cy, r: Math.hypot(ex-cx, ey-cy) };
}

// ═══════════════════════════════
//  페이즈 전환
// ═══════════════════════════════
function showMsg(text, duration, cb) {
    phaseMsgEl.textContent = text;
    phaseMsgEl.style.opacity = '1';
    setTimeout(() => {
        phaseMsgEl.style.opacity = '0';
        if (cb) setTimeout(cb, 900);
    }, duration);
}

function transitionToPhase2() {
    transitioning = true;
    // 유도 링 페이드 아웃
    guideRing.style.opacity = '0';
    satSVG.style.opacity    = '0';
    hintEl.style.opacity    = '0';

    showMsg('좋아요', 1200, () => {
        phase = 2;
        transitioning = false;
        hintEl.textContent = '천천히 쓰다듬어요';
        hintEl.style.opacity = '1';
        feedbackUI.style.opacity = '1';
    });
}

function transitionToPhase3() {
    transitioning = true;
    feedbackUI.style.opacity = '0';
    hintEl.style.opacity     = '0';
    showMsg('따뜻해요', 2000);
    // (이후 Phase 3 연결 예정)
}

// ═══════════════════════════════
//  애니메이션 루프
// ═══════════════════════════════
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // 카메라 보간
    cTheta  += (tTheta  - cTheta)  * 0.055;
    cPhi    += (tPhi    - cPhi)    * 0.055;
    cRadius += (tRadius - cRadius) * 0.055;
    camera.position.set(
        cRadius * Math.sin(cPhi) * Math.cos(cTheta),
        cRadius * Math.cos(cPhi),
        cRadius * Math.sin(cPhi) * Math.sin(cTheta)
    );
    camera.lookAt(0, 0, 0);

    // ── Phase 1 로직 ──
    if (phase === 1 && !transitioning) {
        const inZone = cRadius >= P1_ZONE_MIN && cRadius <= P1_ZONE_MAX;

        if (inZone) satisfactionScore = Math.min(1, satisfactionScore + P1_INCR);
        else        satisfactionScore = Math.max(0, satisfactionScore - P1_DECR);

        // 유도 링
        satSVG.style.opacity = satisfactionScore > 0.02 ? '1' : '0';
        guideRing.classList.toggle('inZone', inZone);
        updateSatArc(satisfactionScore);

        // 힌트 텍스트
        if (!inZone) {
            hintEl.textContent = cRadius > P1_ZONE_MAX ? '조금 더 가까이' : '조금 더 멀리';
        } else {
            hintEl.textContent = '';
        }

        if (satisfactionScore >= 1) transitionToPhase2();
    }

    // ── Phase 2 로직 ──
    if (phase === 2 && !transitioning) {
        // 마우스 속도
        const spd = Math.hypot(mouseX - prevMX, mouseY - prevMY);
        mouseSpeed += (spd - mouseSpeed) * 0.1;
        prevMX = mouseX; prevMY = mouseY;

        // 구 위에 마우스 있는지 (스크린 스페이스)
        const { cx, cy, r } = getSphereScreen();
        const onSphere = Math.hypot(mouseX - cx, mouseY - cy) < r * 1.15 && !isDragging;

        const goodSpeed = mouseSpeed >= MIN_SPD && mouseSpeed <= MAX_SPD;

        if (onSphere && goodSpeed)       touchScore = Math.min(1, touchScore + 1/800);
        else if (onSphere && mouseSpeed > MAX_SPD) touchScore = Math.max(0, touchScore - 0.005);
        else                             touchScore = Math.max(0, touchScore - 0.003);

        // 온도 표시
        const tempNow = (34 + touchScore * 2.5).toFixed(2);
        let fbText = `${tempNow}°C`;
        if (!onSphere)                    fbText = '';
        else if (mouseSpeed > MAX_SPD)    fbText = `너무 빠르게요...`;
        else if (mouseSpeed < MIN_SPD && mouseSpeed > 0.2) fbText = `좀 더 쓸어봐요`;
        else if (touchScore >= 0.99)      fbText = `${tempNow}°C  완벽해요...`;
        feedbackUI.textContent = fbText;

        // 파티클 색 온기 반영
        for (let i = 0; i < N; i++) {
            const w = touchScore * 0.25;
            colArr[i*3]   = Math.min(1, colBase[i*3]   + w * 0.20);
            colArr[i*3+1] = Math.min(1, colBase[i*3+1] - w * 0.04);
            colArr[i*3+2] = Math.min(1, colBase[i*3+2] - w * 0.04);
        }
        colAttr.needsUpdate = true;

        // 배경 흰 → #fce8ef
        const bg_r = Math.round(255 - 3  * touchScore);
        const bg_g = Math.round(255 - 40 * touchScore);
        const bg_b = Math.round(255 - 28 * touchScore);
        renderer.setClearColor(new THREE.Color(`rgb(${bg_r},${bg_g},${bg_b})`));

        // 힌트 숨김
        if (touchScore > 0.05) hintEl.style.opacity = '0';

        if (touchScore >= 1 && !transitioning) transitionToPhase3();
    }

    // ── 파티클 호흡 ──
    for (let i = 0; i < N; i++) {
        const ox = origPos[i*3], oy = origPos[i*3+1], oz = origPos[i*3+2];
        const phase_p = t * 0.6 + i * 0.031;
        const breathe = 1.0 + Math.sin(phase_p) * 0.032 + Math.sin(phase_p * 2.1) * 0.012;
        posArr[i*3]   = ox * breathe;
        posArr[i*3+1] = oy * breathe;
        posArr[i*3+2] = oz * breathe;
    }
    posAttr.needsUpdate = true;

    // 자전
    points.rotation.y += 0.0007;

    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
